<div class="container-fluid py-3">
  <div class="page-header mb-4">
    <h1 class="page-title mb-1">User Approvals</h1>
    <p class="text-secondary subtitle mb-0">Review and approve new user registrations.</p>
  </div>

  <ng-container *ngIf="pendingUsers().length > 0; else noDataTemplate">
    <mat-card class="grid-card">
      <mat-card-content class="p-0">
        <div class="table-responsive">
          <table mat-table [dataSource]="pendingUsers()" class="w-100 modern-table">
            
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let element">
                <div class="fw-bold text-dark">{{element.full_name || 'N/A'}}</div>
              </td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef> Email </th>
              <td mat-cell *matCellDef="let element" class="text-secondary">
                {{element.email}}
              </td>
            </ng-container>

            <ng-container matColumnDef="joined">
              <th mat-header-cell *matHeaderCellDef> Registered At </th>
              <td mat-cell *matCellDef="let element" class="text-secondary text-xs">
                {{element.created_at | date:'medium'}}
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-end"> Actions </th>
              <td mat-cell *matCellDef="let element" class="text-end">
                <button mat-icon-button color="primary" (click)="approveUser(element.user_id)" matTooltip="Approve">
                  <mat-icon>check_circle</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="rejectUser(element.user_id)" matTooltip="Reject">
                  <mat-icon>cancel</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover-row"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </ng-container>

  <ng-template #noDataTemplate>
    <app-empty-state
      icon="verified_user"
      title="No Pending Approvals"
      description="All users have been processed. There are currently no pending users waiting for approval."
      actionLabel=""
    ></app-empty-state>
  </ng-template>
</div>
