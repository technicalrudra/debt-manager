<div class="container-fluid py-3">
  <div class="page-header mb-4">
    <h1 class="page-title mb-1">Permissions</h1>
    <p class="text-secondary subtitle mb-0">Assign system and module permissions to each role.</p>
  </div>

  <mat-card class="grid-card mb-4">
    <mat-card-content class="p-3">
      <mat-form-field appearance="outline" class="w-100 max-w-sm mb-0">
        <mat-label>Select Role</mat-label>
        <mat-select [(ngModel)]="selectedRoleId">
          <mat-option *ngFor="let role of roles()" [value]="role.id">{{ role.display_name }}</mat-option>
        </mat-select>
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <mat-card class="grid-card">
    <mat-card-header class="border-bottom pb-3 mb-0">
      <mat-card-title>Permissions for Selected Role</mat-card-title>
    </mat-card-header>
    <mat-card-content class="p-0">
      <div class="table-responsive">
        <table mat-table [dataSource]="permissions()" class="w-100 modern-table">
          
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Permission </th>
            <td mat-cell *matCellDef="let element">
              <div class="fw-bold text-dark">{{element.name}}</div>
            </td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Description </th>
            <td mat-cell *matCellDef="let element" class="text-secondary">
              {{element.description}}
            </td>
          </ng-container>

          <ng-container matColumnDef="module">
            <th mat-header-cell *matHeaderCellDef> Module </th>
            <td mat-cell *matCellDef="let element">
              <span class="badge bg-light text-dark">{{ moduleName(element.module_id) }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="assigned">
            <th mat-header-cell *matHeaderCellDef class="text-center"> Assigned </th>
            <td mat-cell *matCellDef="let element" class="text-center">
              <mat-checkbox 
                [checked]="hasPermission(element.id)"
                (change)="togglePermission(element.id, $event.checked)"
                color="primary">
              </mat-checkbox>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover-row"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
