<div class="container-fluid py-2">
  <div class="page-header mb-4">
    <h1 class="welcome-text mb-1">Settings</h1>
    <p class="text-secondary subtitle mb-0">Manage your preferences and app configurations.</p>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-6">
      <mat-card class="grid-card h-100">
        <mat-card-header>
          <mat-card-title>Appearance</mat-card-title>
        </mat-card-header>
        <mat-card-content class="pt-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">Dark Mode</div>
              <div class="text-secondary text-sm">Switch to a dark theme.</div>
            </div>
            <mat-slide-toggle></mat-slide-toggle>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="col-12 col-md-6">
      <mat-card class="grid-card h-100">
        <mat-card-header>
          <mat-card-title>Notifications</mat-card-title>
        </mat-card-header>
        <mat-card-content class="pt-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">Email Reminders</div>
              <div class="text-secondary text-sm">Get email reminders for upcoming EMIs.</div>
            </div>
            <mat-slide-toggle [checked]="true"></mat-slide-toggle>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
