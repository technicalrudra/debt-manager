<div class="auth-container">
  <div class="auth-card-container">
    <mat-card class="auth-card">
      <div class="auth-header text-center">
        <mat-icon color="primary" class="auth-logo">lock_reset</mat-icon>
        <h2>Reset Password</h2>
        <p class="text-secondary">Enter your email to receive a password reset link.</p>
      </div>

      <mat-card-content *ngIf="!emailSent">
        <div class="auth-alert auth-alert-error" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" type="email" placeholder="you@example.com">
            <mat-error *ngIf="resetForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="resetForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>

          <button mat-raised-button color="primary" class="w-100 submit-btn" type="submit" [disabled]="resetForm.invalid || loading">
            <mat-spinner *ngIf="loading" diameter="20" class="me-2"></mat-spinner>
            {{ loading ? 'Sending...' : 'Send Reset Link' }}
          </button>
        </form>
      </mat-card-content>

      <mat-card-content *ngIf="emailSent" class="text-center py-4">
        <div class="success-icon-wrapper mb-3">
          <mat-icon class="success-icon">mark_email_read</mat-icon>
        </div>
        <h3 class="fw-bold mb-2">Check Your Email</h3>
        <p class="text-secondary mb-4">
          We have sent a password reset link to <strong>{{ resetForm.value.email }}</strong>.
        </p>
      </mat-card-content>

      <div class="auth-footer text-center mt-3">
        <a routerLink="/login" class="text-primary fw-medium"><mat-icon inline="true">arrow_back</mat-icon> Back to Login</a>
      </div>
    </mat-card>
  </div>
</div>
