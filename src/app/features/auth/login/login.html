<div class="auth-container">
  <div class="auth-card-container">
    <mat-card class="auth-card">
      <div class="auth-header text-center">
        <mat-icon color="primary" class="auth-logo">account_balance</mat-icon>
        <h2>Welcome Back</h2>
        <p class="text-secondary">Log in to your Debt Manager account.</p>
      </div>

      <mat-card-content>
        <!-- Error Alert -->
        <div class="auth-alert auth-alert-error" *ngIf="errorMessage()">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" type="email" placeholder="you@example.com" id="login-email">
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" [type]="hidePassword() ? 'password' : 'text'" placeholder="Enter your password" id="login-password">
            <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
              <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
            <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
          </mat-form-field>

          <div class="flex-between mb-3">
            <a routerLink="/forgot-password" class="text-primary text-sm">Forgot Password?</a>
          </div>

          <button mat-raised-button color="primary" class="w-100 submit-btn" type="submit" [disabled]="loginForm.invalid || loading()" id="login-submit">
            <mat-spinner *ngIf="loading()" diameter="20" class="me-2"></mat-spinner>
            {{ loading() ? 'Signing in...' : 'Log In' }}
          </button>
        </form>
      </mat-card-content>

      <div class="auth-footer text-center mt-3">
        <p>Don't have an account? <a routerLink="/signup" class="text-primary fw-medium">Sign up</a></p>
      </div>
    </mat-card>
  </div>
</div>
