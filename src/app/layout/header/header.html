<mat-toolbar class="header">
  <div class="header-left d-flex align-items-center">
    <button mat-icon-button class="me-2" (click)="onToggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="header-app-name d-flex d-md-none">Debt Manager</span>
    <div class="header-greeting d-none d-md-flex flex-column">
      <span class="header-hello">{{ greeting }} 👋</span>
    </div>
  </div>
  
  <div class="header-right">
   

    <button mat-icon-button class="header-action hide-on-mobile" (click)="toggleDarkMode()">
      <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <button mat-icon-button class="header-action hide-on-mobile">
      <mat-icon>notifications</mat-icon>
      <span class="notification-badge"></span>
    </button>
    
    <div class="user-profile" [matMenuTriggerFor]="userMenu">
      <div class="avatar">{{ (authService.currentProfile()?.full_name || 'U') | slice:0:1 | uppercase }}</div>
      <mat-icon class="profile-arrow">keyboard_arrow_down</mat-icon>
    </div>
    
    <mat-menu #userMenu="matMenu" class="custom-menu">
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item (click)="goToSettings()">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
