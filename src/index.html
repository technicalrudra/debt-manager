<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DebtManager</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <app-root>
      <!-- Shows only while Angular bundle is downloading. Replaced automatically when Angular boots. -->
      <div style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:#ffffff;z-index:9999;gap:20px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span class="material-icons" style="font-size:32px;color:#4f46e5;">account_balance</span>
          <span style="font-size:20px;font-weight:700;color:#1d2939;font-family:Inter,sans-serif;">Debt Manager</span>
        </div>
        <div style="
          width:44px;height:44px;border-radius:50%;
          border:3px solid #e8e7fd;border-top-color:#4f46e5;
          animation:spin 0.8s linear infinite;">
        </div>
        <p style="font-size:13px;color:#98a2b3;font-family:Inter,sans-serif;margin:0;">Loading your dashboard…</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </app-root>
  </body>
</html>
